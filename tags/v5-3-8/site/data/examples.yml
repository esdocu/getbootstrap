- category: Plantillas de inicio
  external: true
  description: 'Ejemplos funcionales del uso de Bootstrap en frameworks comunes de JS como Webpack, Parcel, Vite y más, que puedes editar en StackBlitz.'
  examples:
    - name: Inicio con CDN
      description: "Incluye instantáneamente el CSS y JavaScript compilados de Bootstrap a través del CDN de jsDelivr."
      url: /examples/tree/main/starter
    - name: Sass y JS
      description: "Usa npm para importar y compilar el Sass de Bootstrap con Autoprefixer y Stylelint, además de nuestro JavaScript empaquetado."
      url: /examples/tree/main/sass-js
    - name: Sass y ESM JS
      description: "Importa y compila el Sass de Bootstrap con Autoprefixer y Stylelint, y compila nuestro JavaScript de origen con un shim ESM."
      url: /examples/tree/main/sass-js-esm
    - name: Modos de color de Bootstrap
      description: "Importa y compila el Sass de Bootstrap con Stylelint, y los modos de color de Bootstrap."
      url: /examples/tree/main/color-modes
    - name: Iconos de Bootstrap
      description: "Importa y compila el Sass de Bootstrap con Stylelint, PurgeCSS y la fuente web de Bootstrap Icons."
      url: /examples/tree/main/icons-font
    - name: Parcel
      description: "Importa y empaqueta el Sass y JavaScript de origen de Bootstrap a través de Parcel."
      url: /examples/tree/main/parcel
      indexPath: src/index.html
    - name: React
      description: "Importa y empaqueta el Sass y JavaScript de origen de Bootstrap con React, Next.js y React Bootstrap."
      url: /examples/tree/main/react-nextjs
      indexPath: src/pages/index.tsx
    - name: Vite
      description: "Importa y empaqueta el Sass y JavaScript de origen de Bootstrap con Vite."
      url: /examples/tree/main/vite
    - name: Vue
      description: "Importa y empaqueta el Sass y JavaScript de origen de Bootstrap con Vue y Vite."
      url: /examples/tree/main/vue
    - name: Webpack
      description: "Importa y empaqueta el Sass y JavaScript de origen de Bootstrap con Webpack."
      url: /examples/tree/main/webpack
      indexPath: src/index.html

- category: Fragmentos
  description: 'Patrones comunes para construir sitios y aplicaciones que se basan en componentes y utilidades existentes con CSS personalizado y más.'
  examples:
    - name: Cabeceras
      description: 'Muestra tu marca, navegación, búsqueda y más con estos componentes de cabecera'
    - name: Heroes
      description: 'Prepara el escenario en tu página de inicio con secciones hero que presentan llamadas a la acción claras.'
    - name: Características
      description: 'Explica las características, beneficios u otros detalles en tu contenido de marketing.'
    - name: Barras laterales
      description: 'Patrones de navegación comunes ideales para diseños offcanvas o de múltiples columnas.'
    - name: Pies de página
      description: 'Termina cada página con fuerza con un pie de página increíble, grande o pequeño.'
    - name: Dropdowns
      description: 'Mejora tus menús desplegables con filtros, iconos, estilos personalizados y más.'
    - name: Grupos de listas
      description: 'Extiende los grupos de listas con utilidades y estilos personalizados para cualquier contenido.'
    - name: Modales
      description: 'Transforma los modales para cumplir cualquier propósito, desde recorridos por funciones hasta diálogos.'
    - name: Insignias
      description: 'Haz que las insignias funcionen con HTML interno personalizado y nuevos aspectos.'
    - name: Migas de pan
      description: 'Integra iconos personalizados y crea componentes de pasos.'
    - name: Botones
      description: 'Crea botones personalizados para casi cualquier caso de uso con utilidades.'
    - name: Jumbotrons
      description: 'Crea versiones modernizadas del clásico componente Bootstrap.'

- category: Componentes personalizados
  description: 'Componentes y plantillas completamente nuevos para ayudar a las personas a comenzar rápidamente con Bootstrap y demostrar las mejores prácticas para extender el framework.'
  examples:
    - name: Álbum
      description: 'Plantilla simple de una sola página para galerías de fotos, portafolios y más.'
    - name: Precios
      description: 'Ejemplo de página de precios creada con Tarjetas y que presenta una cabecera y pie de página personalizados.'
    - name: Checkout
      description: 'Formulario de checkout personalizado que muestra nuestros componentes de formulario y sus funciones de validación.'
    - name: Producto
      description: 'Página de marketing sencilla centrada en el producto con un amplio trabajo de cuadrícula e imágenes.'
    - name: Portada
      description: 'Una plantilla de una sola página para crear páginas de inicio sencillas y hermosas.'
    - name: Carrusel
      description: 'Personaliza la barra de navegación y el carrusel, luego añade algunos componentes nuevos.'
    - name: Blog
      description: 'Plantilla de blog tipo revista con cabecera, navegación y contenido destacado.'
    - name: Panel de control
      description: 'Estructura básica de panel de administración con barra lateral y barra de navegación fijas.'
    - name: Iniciar sesión
      description: 'Diseño y maquetación de formulario personalizado para un formulario de inicio de sesión simple.'
    - name: Pie de página fijo
      description: 'Fija un pie de página en la parte inferior de la pantalla cuando el contenido de la página es corto.'
    - name: Barra de navegación con pie de página fijo
      description: 'Fija un pie de página en la parte inferior de la pantalla con una barra de navegación fija en la parte superior.'
    - name: Jumbotron
      description: "Utiliza utilidades para recrear y mejorar el jumbotron de Bootstrap 4."

- category: Framework
